services:
  bot:
    build:
      context: ..
      dockerfile: Dockerfile
    image: csky-discord-bot:latest
    container_name: csky-bot
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - ./data:/app/data
    # env_file:
    #   - .env
