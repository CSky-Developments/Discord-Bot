services:
  bot:
    build:
      context: ..
      dockerfile: Dockerfile
    image: ghcr.io/csky-developments/discord-bot:${IMAGE_TAG:-latest}
    container_name: csky-bot
    user: "${PUID:?PUID not set}:${PGID:?PGID not set}"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - ../data:/app/data
      - ../data/logs:/app/logs
    env_file:
      - .env
